<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #050569;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: underline;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 20px;
            text-transform: uppercase;
        }

        .login-link {
            color: white;
            text-decoration: underline;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

      
        .main-title {
            text-align: center;
            font-size: 3rem;
            text-transform: uppercase;
            text-decoration: underline;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

     
        .banner-container {
            width: 100%;
            border-top: 4px solid black;
            border-bottom: 4px solid black;
            overflow: hidden;
            display: flex;
        }

        .banner-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            object-position: center 20%;
        }

     
        .gallery-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 40px 20px;
            flex-wrap: wrap; 
        }

        .card-border {
            background-color: black;
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 16 / 9; 
            display: flex;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        
        footer {
            background-color: #6a6a9b; 
            color: white;
            text-align: center;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Sobre</a>
        </div>
        <a href="#" class="login-link">Login</a>
    </header>

    <h1 class="main-title">Sonic</h1>

    <div class="banner-container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQj_hCjM5IGDuKAbbasyGL1_1oFSPTWzgzwFA&s"   class="banner-img">
    </div>

    <main class="gallery-container">
        
        <div class="card-border">
            <img src="https://i0.wp.com/cinegrandiose.com/wp-content/uploads/Sonic-1.png?fit=960%2C540&ssl=1" class="card-img">
        </div>

        <div class="card-border">
            <img src="https://i.redd.it/5t0l19bs31lf1.jpeg" class="card-img">
        </div>

        <div class="card-border">
            <img src="https://sm.ign.com/ign_br/news/t/the-game-a/the-game-awards-players-voice-award-nominees-revealed-the-30_eh2q.jpg" alt="Shadow" class="card-img">
        </div>

    </main>

    <footer>
        copyright gabriel souza - Etec MCM - IWI - Prof. Bruno
    </footer>

</body>
</html>
