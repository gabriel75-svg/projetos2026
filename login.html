<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAÇA SEU LOGIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #000066; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

     
        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: underline;
            font-weight: bold;
            font-size: 1.1rem;
        }

       
        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-decoration: underline;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        
        .login-card {
            background-color: #000000;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: white;
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .btn {
            background-color: white;
            color: black;
            border: none;
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-decoration: none;
            min-width: 130px;
        }

        .btn:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <a href="#" class="home-link">HOME</a>

    <div class="container">
        <h1>FAÇA SEU LOGIN</h1>
        
        <div class="login-card">
            <form action="">
                
                <div class="input-group">
                    <label name="login">Login</label>
                    <input type="text" id="login" required>
                </div>

                <div class="input-group">
                    <label name="senha">Senha</label>
                    <input type="password" id="senha" required>
                </div>

                <div class="button-group">
                    <button type="button" class="btn">Cadastrar</button>
                    <button type="submit" class="btn">Logar</button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
